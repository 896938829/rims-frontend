name: rims_frontend
description: "A RIMS project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  crypto: ^3.0.7
  connectivity_plus: ^7.1.1
  dio: ^5.9.2
  drift: ^2.34.1
  drift_flutter: ^0.3.0
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  image_picker: ^1.2.2
  local_auth: ^3.0.2
  intl: ^0.20.2
  json_annotation: ^4.12.0
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  share_plus: ^12.0.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  shared_preferences_platform_interface: ^2.4.2
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.1
  json_serializable: ^6.14.0
  sqlite3: ^3.4.0
  xml: ^6.6.1

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/illustrations/
    - assets/images/products/
    - assets/icons/actions/
    - assets/icons/hints/
    - assets/icons/modules/
    - assets/icons/nav/
    - assets/icons/status/
